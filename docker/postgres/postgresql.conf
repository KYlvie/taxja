# =============================================================================
# PostgreSQL 15 — tuned for 100K users / tens of millions of rows
# Target server: 16GB RAM, 4-8 vCPU, SSD storage
# =============================================================================

# ---------------------------------------------------------------------------
# Connection Management
# ---------------------------------------------------------------------------
# PgBouncer handles client connections; PG only sees pooled server conns.
# 300 is enough for PgBouncer(80) + Celery(16) + admin/migration/monitoring.
max_connections = 300
superuser_reserved_connections = 5

# ---------------------------------------------------------------------------
# Memory  (assuming 16GB total RAM for the PG container)
# ---------------------------------------------------------------------------
shared_buffers = 4GB                # 25% of RAM — hot data cache
effective_cache_size = 12GB         # 75% of RAM — planner hint (OS page cache)
work_mem = 32MB                     # per sort/hash; 300 conns × 32MB = 9.6GB worst case
maintenance_work_mem = 1GB          # VACUUM, CREATE INDEX, ALTER TABLE
wal_buffers = 128MB                 # max 1/32 of shared_buffers
huge_pages = try                    # use huge pages if OS supports it

# ---------------------------------------------------------------------------
# Write-Ahead Log (WAL)
# ---------------------------------------------------------------------------
wal_level = replica                 # needed for streaming replication / PITR
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
wal_compression = on                # reduce WAL I/O

# ---------------------------------------------------------------------------
# Query Planner — SSD-optimized
# ---------------------------------------------------------------------------
random_page_cost = 1.1              # SSD: nearly same as seq
effective_io_concurrency = 200      # SSD concurrent I/O
default_statistics_target = 300     # more accurate plans for complex queries
jit = on                            # JIT compilation for complex queries

# ---------------------------------------------------------------------------
# Parallel Query
# ---------------------------------------------------------------------------
max_worker_processes = 12
max_parallel_workers_per_gather = 4
max_parallel_workers = 12
max_parallel_maintenance_workers = 4

# ---------------------------------------------------------------------------
# Background Writer — reduce checkpoint spikes
# ---------------------------------------------------------------------------
bgwriter_delay = 50ms
bgwriter_lru_maxpages = 400
bgwriter_lru_multiplier = 4.0
bgwriter_flush_after = 512kB

# ---------------------------------------------------------------------------
# Logging (production: only slow queries + important events)
# ---------------------------------------------------------------------------
log_min_duration_statement = 200    # log queries > 200ms
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 1000  # log autovacuum > 1s
log_line_prefix = '%t [%p] %u@%d '

# ---------------------------------------------------------------------------
# Autovacuum — aggressive for high-write tables (transactions, chat, usage)
# ---------------------------------------------------------------------------
autovacuum_max_workers = 6
autovacuum_naptime = 15s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.02   # vacuum when 2% of rows changed
autovacuum_analyze_scale_factor = 0.01  # analyze when 1% of rows changed
autovacuum_vacuum_cost_delay = 2ms      # less throttling
autovacuum_vacuum_cost_limit = 1000     # more aggressive

# ---------------------------------------------------------------------------
# Replication readiness (for future read replicas)
# ---------------------------------------------------------------------------
max_wal_senders = 5
max_replication_slots = 5
hot_standby = on

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
timezone = 'Europe/Vienna'
lc_messages = 'en_US.utf8'
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
