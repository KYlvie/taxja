<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Taxja - Austrian Tax Management System" />
    <meta name="theme-color" content="#ffffff" />
    <title>Taxja - Steuern einfach ja!</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try { const s=JSON.parse(localStorage.getItem('taxja-theme')||'{}');
        if(s.state?.theme==='cyber') document.documentElement.setAttribute('data-theme','cyber');
      } catch(e){}
    </script>
    <script>
      // Auto-reload when a new Service Worker takes over
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          window.location.reload();
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
