<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taxja - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .offline-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      background: #f5f5f5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }

    h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 16px;
    }

    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .retry-button {
      background: #1976d2;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .retry-button:hover {
      background: #1565c0;
    }

    .offline-features {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid #e0e0e0;
      text-align: left;
    }

    .offline-features h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 16px;
    }

    .offline-features ul {
      list-style: none;
      padding: 0;
    }

    .offline-features li {
      color: #666;
      font-size: 14px;
      padding: 8px 0;
      padding-left: 24px;
      position: relative;
    }

    .offline-features li:before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #4caf50;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      📡
    </div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. 
      Don't worry, you can still view your cached data.
    </p>
    <button class="retry-button" onclick="window.location.reload()">
      Try Again
    </button>

    <div class="offline-features">
      <h2>Available Offline:</h2>
      <ul>
        <li>View previously loaded transactions</li>
        <li>View cached documents</li>
        <li>View tax calculations</li>
        <li>Browse your dashboard</li>
      </ul>
    </div>
  </div>

  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
