name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Build frontend
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npx vite build

      - name: Upload frontend dist
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # Deploy to Production (SSH + Docker Compose)
  deploy:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 46.62.227.62 >> ~/.ssh/known_hosts

      - name: Deploy backend (git pull + rebuild + migrate)
        run: |
          ssh root@46.62.227.62 << 'EOF'
            set -e
            cd /opt/taxja
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.server.yml --env-file .env.prod build backend celery-worker
            # Run database migrations before starting
            docker compose -f docker-compose.server.yml --env-file .env.prod run --rm backend alembic upgrade head
            docker compose -f docker-compose.server.yml --env-file .env.prod up -d backend celery-worker
            sleep 3
            curl -sf http://localhost:8000/api/v1/health | grep -q healthy && echo "Backend OK" || (echo "Backend health check failed" && exit 1)
          EOF

      - name: Upload frontend dist to server
        run: |
          rsync -az --delete frontend/dist/ root@46.62.227.62:/opt/taxja/frontend/dist/

      - name: Reload nginx
        run: |
          ssh root@46.62.227.62 "docker restart taxja-nginx"

      - name: Smoke test
        run: |
          sleep 5
          curl -sf https://taxja.at/api/v1/health | grep -q healthy && echo "Production OK"
