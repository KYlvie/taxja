name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: taxja
          POSTGRES_PASSWORD: taxja_password
          POSTGRES_DB: taxja_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run tests
        working-directory: ./backend
        env:
          SECRET_KEY: test-secret-key
          ENCRYPTION_KEY: test-encryption-key
          POSTGRES_SERVER: localhost
          POSTGRES_USER: taxja
          POSTGRES_PASSWORD: taxja_password
          POSTGRES_DB: taxja_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        run: |
          pytest --cov=app --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend

  # Frontend Tests
  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run linter
        working-directory: ./frontend
        run: npm run lint
      
      - name: Run tests
        working-directory: ./frontend
        run: npx vitest --run
      
      - name: Build
        working-directory: ./frontend
        run: npm run build

  # Build and Push Docker Images
  build-and-push:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: taxja/backend:latest,taxja/backend:${{ github.sha }}
          cache-from: type=registry,ref=taxja/backend:latest
          cache-to: type=inline
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: taxja/frontend:latest,taxja/frontend:${{ github.sha }}
          cache-from: type=registry,ref=taxja/frontend:latest
          cache-to: type=inline

  # Deploy to Staging
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
      
      - name: Update image tags
        run: |
          kubectl set image deployment/backend backend=taxja/backend:${{ github.sha }} -n taxja-staging
          kubectl set image deployment/celery-worker celery-worker=taxja/backend:${{ github.sha }} -n taxja-staging
          kubectl set image deployment/frontend frontend=taxja/frontend:${{ github.sha }} -n taxja-staging
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n taxja-staging --timeout=5m
          kubectl rollout status deployment/celery-worker -n taxja-staging --timeout=5m
          kubectl rollout status deployment/frontend -n taxja-staging --timeout=5m
      
      - name: Verify deployment
        run: |
          kubectl get pods -n taxja-staging
          kubectl get services -n taxja-staging

  # Deploy to Production
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
      
      - name: Update image tags
        run: |
          kubectl set image deployment/backend backend=taxja/backend:${{ github.sha }} -n taxja
          kubectl set image deployment/celery-worker celery-worker=taxja/backend:${{ github.sha }} -n taxja
          kubectl set image deployment/frontend frontend=taxja/frontend:${{ github.sha }} -n taxja
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n taxja --timeout=10m
          kubectl rollout status deployment/celery-worker -n taxja --timeout=10m
          kubectl rollout status deployment/frontend -n taxja --timeout=10m
      
      - name: Verify deployment
        run: |
          kubectl get pods -n taxja
          kubectl get services -n taxja
      
      - name: Run smoke tests
        run: |
          # Wait for services to be ready
          sleep 30
          # Test backend health endpoint
          curl -f https://taxja.at/api/health || exit 1
          # Test frontend
          curl -f https://taxja.at/ || exit 1
