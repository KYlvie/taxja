name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: taxja
          POSTGRES_PASSWORD: taxja_password
          POSTGRES_DB: taxja_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        working-directory: ./backend
        env:
          SECRET_KEY: test-secret-key
          ENCRYPTION_KEY: test-encryption-key
          POSTGRES_SERVER: localhost
          POSTGRES_USER: taxja
          POSTGRES_PASSWORD: taxja_password
          POSTGRES_DB: taxja_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        run: |
          pytest --cov=app --cov-report=xml

  # Frontend Tests
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint || true  # lint warnings don't block deploy

      - name: Run tests
        working-directory: ./frontend
        run: npx vitest --run

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # 把构建产物传给部署 job
      - name: Upload frontend dist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # Deploy to Production (SSH + Docker Compose)
  deploy:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 178.104.73.139 >> ~/.ssh/known_hosts

      - name: Deploy backend (git pull + rebuild)
        run: |
          ssh root@178.104.73.139 << 'EOF'
            set -e
            cd /opt/taxja
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.server.yml build backend
            docker compose -f docker-compose.server.yml up -d backend
            # 等待后端启动
            sleep 8
            curl -sf http://localhost:8000/api/v1/health | grep -q healthy && echo "Backend OK" || (echo "Backend health check failed" && exit 1)
          EOF

      - name: Upload frontend dist to server
        run: |
          rsync -az --delete frontend/dist/ root@178.104.73.139:/opt/taxja/frontend/dist/

      - name: Reload nginx
        run: |
          ssh root@178.104.73.139 "docker restart taxja-nginx"

      - name: Smoke test
        run: |
          sleep 5
          curl -sf https://taxja.at/api/v1/health | grep -q healthy && echo "Production OK"
