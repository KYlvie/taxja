apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: taxja
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
      # Backend API metrics
      - job_name: 'backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - taxja
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: backend
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:8000
      
      # Celery worker metrics
      - job_name: 'celery-worker'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - taxja
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: celery-worker
      
      # PostgreSQL metrics
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres:5432']
      
      # Redis metrics
      - job_name: 'redis'
        static_configs:
          - targets: ['redis:6379']
      
      # MinIO metrics
      - job_name: 'minio'
        static_configs:
          - targets: ['minio:9000']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: taxja
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--storage.tsdb.retention.time=30d'
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: storage
          mountPath: /prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        persistentVolumeClaim:
          claimName: prometheus-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: taxja
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: taxja
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
