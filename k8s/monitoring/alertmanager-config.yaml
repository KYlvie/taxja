apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: taxja
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'email-notifications'
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
        - match:
            severity: warning
          receiver: 'email-notifications'
    
    receivers:
      - name: 'email-notifications'
        email_configs:
          - to: 'alerts@taxja.at'
            from: 'alertmanager@taxja.at'
            smarthost: 'smtp.gmail.com:587'
            auth_username: 'alertmanager@taxja.at'
            auth_password: '{{ .ExternalSecret }}'
            headers:
              Subject: '[Taxja Alert] {{ .GroupLabels.alertname }}'
      
      - name: 'pagerduty-critical'
        pagerduty_configs:
          - service_key: '{{ .ExternalSecret }}'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: taxja
data:
  alerts.yml: |
    groups:
      - name: taxja_alerts
        interval: 30s
        rules:
          # High error rate
          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate detected"
              description: "Error rate is {{ $value }} errors/sec"
          
          # High response time
          - alert: HighResponseTime
            expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High response time detected"
              description: "95th percentile response time is {{ $value }}s"
          
          # Database connection issues
          - alert: DatabaseConnectionFailure
            expr: up{job="postgres"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Database connection failure"
              description: "PostgreSQL is down"
          
          # Redis connection issues
          - alert: RedisConnectionFailure
            expr: up{job="redis"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Redis connection failure"
              description: "Redis is down"
          
          # High memory usage
          - alert: HighMemoryUsage
            expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage"
              description: "Memory usage is {{ $value | humanizePercentage }}"
          
          # High CPU usage
          - alert: HighCPUUsage
            expr: rate(container_cpu_usage_seconds_total[5m]) > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage"
              description: "CPU usage is {{ $value | humanizePercentage }}"
          
          # OCR processing queue backup
          - alert: OCRQueueBackup
            expr: celery_queue_length{queue="ocr"} > 100
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "OCR processing queue backup"
              description: "OCR queue has {{ $value }} pending tasks"
          
          # Disk space low
          - alert: DiskSpaceLow
            expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Disk space low"
              description: "Only {{ $value | humanizePercentage }} disk space remaining"
