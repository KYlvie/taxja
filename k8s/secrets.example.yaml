apiVersion: v1
kind: Secret
metadata:
  name: taxja-secrets
  namespace: taxja
type: Opaque
stringData:
  secret-key: "your-secret-key-here-change-in-production"
  encryption-key: "your-encryption-key-here-change-in-production"
  postgres-user: "taxja"
  postgres-password: "your-postgres-password-here-change-in-production"
  minio-access-key: "your-minio-access-key-change-in-production"
  minio-secret-key: "your-minio-secret-key-change-in-production"
  grafana-admin-user: "admin"
  grafana-admin-password: "your-grafana-password-change-in-production"
