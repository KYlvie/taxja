apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: taxja
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: taxja/backend:latest
        command: ["celery"]
        args:
        - "-A"
        - "app.celery_app"
        - "worker"
        - "--loglevel=info"
        - "--concurrency=4"
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: taxja-secrets
              key: secret-key
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: taxja-secrets
              key: encryption-key
        - name: POSTGRES_SERVER
          value: postgres
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: taxja-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taxja-secrets
              key: postgres-password
        - name: POSTGRES_DB
          value: taxja
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: "6379"
        - name: MINIO_ENDPOINT
          value: minio:9000
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: taxja-secrets
              key: minio-access-key
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: taxja-secrets
              key: minio-secret-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: taxja
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
      - name: celery-beat
        image: taxja/backend:latest
        command: ["celery"]
        args:
        - "-A"
        - "app.celery_app"
        - "beat"
        - "--loglevel=info"
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: taxja-secrets
              key: secret-key
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: "6379"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
