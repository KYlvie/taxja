apiVersion: v1
kind: ConfigMap
metadata:
  name: taxja-config
  namespace: taxja
data:
  # Database configuration
  POSTGRES_DB: "taxja"
  POSTGRES_PORT: "5432"
  
  # Redis configuration
  REDIS_PORT: "6379"
  
  # MinIO configuration
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "taxja-documents"
  
  # Application configuration
  BACKEND_CORS_ORIGINS: "https://taxja.at,https://www.taxja.at"
  LOG_LEVEL: "INFO"
  
  # Feature flags
  ENABLE_AI_ASSISTANT: "true"
  ENABLE_OCR: "true"
  ENABLE_2FA: "true"
